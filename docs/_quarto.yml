            contents:
              - lessons/differential-equations/index.qmd
              - lessons/differential-equations/first-order-equations.qmd
              - lessons/differential-equations/separable-equations.qmd
              - lessons/differential-equations/linear-equations.qmd
              - lessons/differential-equations/slope-fields.qmd
              - lessons/differential-equations/systems.qmd
          - section: Discrete Mathematics
            contents:
              - lessons/discrete-math/index.qmd
              - lessons/discrete-math/logic.qmd
              - lessons/discrete-math/sets.qmd
              - lessons/discrete-math/functions-relations.qmd
              - lessons/discrete-math/sequences.qmd
              - lessons/discrete-math/induction.qmd
              - lessons/discrete-math/graphs.qmd
      - changelog.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true

execute:
  freeze: auto
