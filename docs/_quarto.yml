project:
  type: website
  output-dir: ../build

website:
  title: edu-math
  description: Python tools for math education workflows.
  site-url: https://osl-incubator.github.io/edu-math/
  repo-url: https://github.com/osl-incubator/edu-math
  repo-actions: [edit, issue]
  page-navigation: true
  bread-crumbs: true
  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Home
      - href: installation.qmd
        text: Install
      - href: api.qmd
        text: API
      - href: lessons/index.qmd
        text: Study Path
    right:
      - icon: github
        href: https://github.com/osl-incubator/edu-math
        aria-label: GitHub repository
  sidebar:
    style: docked
    search: true
    contents:
      - index.qmd
      - installation.qmd
      - api.qmd
      - section: Lessons
        contents:
          - lessons/index.qmd
          - section: Python
            contents:
              - lessons/python/basics.qmd
              - lessons/python/functions-and-control-flow.qmd
              - lessons/python/numpy-and-arrays.qmd
              - lessons/python/plotting.qmd
          - section: Algebra
            contents:
              - lessons/algebra/index.qmd
              - lessons/algebra/expressions-and-equations.qmd
              - lessons/algebra/inequalities-and-absolute-value.qmd
              - lessons/algebra/functions-and-graphs.qmd
              - lessons/algebra/transformations-composition-inverses.qmd
              - lessons/algebra/linear-and-quadratic-functions.qmd
              - lessons/algebra/polynomials.qmd
              - lessons/algebra/rational-and-radical-functions.qmd
              - lessons/algebra/exponentials-and-logarithms.qmd
              - lessons/algebra/systems-of-equations.qmd
              - lessons/algebra/algebraic-modeling.qmd
              - lessons/algebra/symbolic-computation-with-sympy.qmd
              - lessons/algebra/cumulative-review.qmd
          - section: Trigonometry
            contents:
              - lessons/trigonometry/index.qmd
              - lessons/trigonometry/radians-and-degrees.qmd
              - lessons/trigonometry/unit-circle.qmd
              - lessons/trigonometry/sine-cosine.qmd
              - lessons/trigonometry/trig-functions-and-graphs.qmd
              - lessons/trigonometry/identities.qmd
              - lessons/trigonometry/trig-equations.qmd
              - lessons/trigonometry/applications.qmd
          - section: Calculus
            contents:
              - lessons/calculus/index.qmd
              - lessons/calculus/limits.qmd
              - lessons/calculus/derivatives.qmd
              - lessons/calculus/derivative-rules.qmd
              - lessons/calculus/optimization.qmd
              - lessons/calculus/integrals.qmd
              - lessons/calculus/integration-techniques.qmd
              - lessons/calculus/applications.qmd
          - section: Linear Algebra
            contents:
              - lessons/linear-algebra/index.qmd
              - lessons/linear-algebra/vectors.qmd
              - lessons/linear-algebra/matrices.qmd
              - lessons/linear-algebra/matrix-operations.qmd
              - lessons/linear-algebra/systems-and-elimination.qmd
              - lessons/linear-algebra/linear-transformations.qmd
              - lessons/linear-algebra/eigenvalues-eigenvectors.qmd
          - section: Probability
            contents:
              - lessons/probability/index.qmd
              - lessons/probability/sample-spaces-events.qmd
              - lessons/probability/counting.qmd
              - lessons/probability/conditional-probability.qmd
              - lessons/probability/random-variables.qmd
              - lessons/probability/common-distributions.qmd
              - lessons/probability/expectation-variance.qmd
          - section: Statistics
            contents:
              - lessons/statistics/index.qmd
              - lessons/statistics/descriptive-statistics.qmd
              - lessons/statistics/sampling.qmd
              - lessons/statistics/probability-for-statistics.qmd
              - lessons/statistics/sampling-distributions.qmd
              - lessons/statistics/estimation.qmd
              - lessons/statistics/hypothesis-tests.qmd
              - lessons/statistics/comparing-groups.qmd
              - lessons/statistics/chi-square-tests.qmd
              - lessons/statistics/regression-basics.qmd
              - lessons/statistics/statistics-cumulative-review.qmd
