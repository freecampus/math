project:
  type: website
  output-dir: ../build

website:
  title: edu-math
  description: Python tools for math education workflows.
  site-url: https://osl-incubator.github.io/edu-math/
  repo-url: https://github.com/osl-incubator/edu-math
  repo-actions: [edit, issue]
  page-navigation: true
  bread-crumbs: true
  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Home
      - href: installation.qmd
        text: Install
      - href: api.qmd
        text: API
      - href: notebooks/index.qmd
        text: Study Path
      - href: notebooks/python/basics.qmd
        text: Python
      - href: notebooks/algebra/guessing_quiz.qmd
        text: Algebra
      - href: notebooks/trigonometry/sine-cosine.qmd
        text: Trigonometry
      - href: changelog.qmd
        text: Changelog
    right:
      - icon: github
        href: https://github.com/osl-incubator/edu-math
        aria-label: GitHub repository
  sidebar:
    style: docked
    search: true
    contents:
      - index.qmd
      - installation.qmd
      - api.qmd
      - section: Notebooks
        contents:
          - notebooks/index.qmd
          - section: Python
            contents:
              - notebooks/python/basics.qmd
              - notebooks/python/functions-and-control-flow.qmd
              - notebooks/python/numpy-and-arrays.qmd
              - notebooks/python/plotting.qmd
          - section: Algebra
            contents:
              - notebooks/algebra/expressions-and-equations.qmd
              - notebooks/algebra/functions-and-graphs.qmd
              - notebooks/algebra/polynomials.qmd
              - notebooks/algebra/exponentials-and-logarithms.qmd
              - notebooks/algebra/systems-of-equations.qmd
              - notebooks/algebra/guessing_quiz.qmd
          - section: Trigonometry
            contents:
              - notebooks/trigonometry/sine-cosine.qmd
          - section: Calculus
            contents:
              - notebooks/calculus/limits.qmd
              - notebooks/calculus/derivatives.qmd
              - notebooks/calculus/derivative-rules.qmd
              - notebooks/calculus/optimization.qmd
              - notebooks/calculus/integrals.qmd
              - notebooks/calculus/integration-techniques.qmd
              - notebooks/calculus/applications.qmd
          - section: Linear Algebra
            contents:
              - notebooks/linear-algebra/vectors.qmd
              - notebooks/linear-algebra/matrices.qmd
              - notebooks/linear-algebra/matrix-operations.qmd
              - notebooks/linear-algebra/systems-and-elimination.qmd
              - notebooks/linear-algebra/linear-transformations.qmd
              - notebooks/linear-algebra/eigenvalues-eigenvectors.qmd
          - section: Probability
            contents:
              - notebooks/probability/sample-spaces-events.qmd
              - notebooks/probability/counting.qmd
              - notebooks/probability/conditional-probability.qmd
              - notebooks/probability/random-variables.qmd
              - notebooks/probability/common-distributions.qmd
              - notebooks/probability/expectation-variance.qmd
          - section: Statistics
            contents:
              - notebooks/statistics/descriptive-statistics.qmd
              - notebooks/statistics/sampling.qmd
              - notebooks/statistics/estimation.qmd
              - notebooks/statistics/hypothesis-tests.qmd
              - notebooks/statistics/regression-basics.qmd
          - section: Differential Equations
            contents:
              - notebooks/differential-equations/first-order-equations.qmd
              - notebooks/differential-equations/separable-equations.qmd
              - notebooks/differential-equations/linear-equations.qmd
              - notebooks/differential-equations/slope-fields.qmd
              - notebooks/differential-equations/systems.qmd
          - section: Discrete Mathematics
            contents:
              - notebooks/discrete-math/logic.qmd
              - notebooks/discrete-math/sets.qmd
              - notebooks/discrete-math/functions-relations.qmd
              - notebooks/discrete-math/sequences.qmd
              - notebooks/discrete-math/induction.qmd
              - notebooks/discrete-math/graphs.qmd
          - section: Review
            contents:
              - notebooks/review/diagnostic-quiz.qmd
              - notebooks/review/formula-sheet.qmd
              - notebooks/review/mixed-practice.qmd
              - notebooks/review/mock-test.qmd
          - section: Colab
            contents:
              - notebooks/colab/usage.qmd
      - changelog.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true

execute:
  freeze: auto
